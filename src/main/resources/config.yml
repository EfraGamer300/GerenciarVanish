# ================================
#  Vanish+ v1.2.0
#  Compativel: Spigot, Paper, Purpur, Folia
#  Versoes: 1.19 ate 26.1.2
# ================================

# Idioma do plugin (en, pt, es, fr, de)
# Language of the plugin (en, pt, es, fr, de)
language: "en"

# Configuracoes gerais
settings:
  # Permitir vanish no servidor
  vanish-enabled: true
  # Quando sair do servidor com vanish, reativar ao entrar
  save-vanish-on-quit: true
  # Mostrar jogadores com permissao vanish.see no TAB
  show-vanished-in-tab: false
  # Cooldown entre toggles de vanish (ms, minimo 250)
  cooldown-ms: 1000

# Protecoes (para quem esta em vanish)
protection:
  block-interact: true
  block-break: true
  block-place: true
  item-drop: true
  item-pickup: true
  mob-target: true
  pvp: true
  # Abrir baus silenciosamente (sem som/animacao)
  silent-chest: true
